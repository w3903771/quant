<html lang="zh-CN">
<head>

    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;

    @media (max-width:640px){ .cards{ grid-template-columns:1fr; } }
    .card { display:block; text-decoration:none; color:inherit; background:#fff; border:1px solid var(--line);

    .card.survey h2 { color:var(--a2); }

    .card p { color:var(--muted); margin:.4rem 0 0; font-size:.97rem; }
    .note { color:var(--muted); font-size:.86rem; border-top:1px solid var(--line); padding-top:18px; margin-top:36px; }
    .back { display:inline-block; margin-bottom:22px; color:var(--muted); text-decoration:none; font-size:.9rem; }

  <div class="wrap">
    <a class="back" href="https://ebook.ttzg.site/">← ttzg 电子书库</a>

      <a class="card survey" href="/survey/">
